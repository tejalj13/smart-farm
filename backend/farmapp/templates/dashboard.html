<!DOCTYPE html>
<html>

<head>
    <title>Crop Disease Dashboard</title>

    <meta http-equiv="refresh" content="5">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #2c3e50;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 30px;
            background: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        .risk-high {
            color: red;
            font-weight: bold;
        }

        .charts {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        canvas {
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            width: 48%;
            height: 300px;
        }
    </style>
</head>

<body>

    <h1>Crop Disease Dashboard</h1>

    <h2>Sensor Data</h2>

    <table>
        <tr>
            <th>Temp</th>
            <th>Humidity</th>
            <th>Soil</th>
            <th>Leaf</th>
            <th>Light</th>
            <th>Risk</th>
            <th>Time</th>
        </tr>

        {% for d in data %}
        <tr>
            <td>{{ d.temperature }}</td>
            <td>{{ d.humidity }}</td>
            <td>{{ d.soil_moisture }}</td>
            <td>{{ d.leaf_wetness }}</td>
            <td>{{ d.light_intensity }}</td>
            <td class="risk-high">{{ d.risk }}</td>
            <td>{{ d.timestamp|date:'H:i:s' }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="charts">
        <canvas id="tempChart"></canvas>
        <canvas id="humidityChart"></canvas>
    </div>

    <!-- SAFE JSON DATA -->
    <script id="data-json" type="application/json">
    {{ data_json|safe }}
</script>

    <script>
        window.onload = function () {

            const rawData = JSON.parse(document.getElementById('data-json').textContent);

            console.log("DATA:", rawData);

            if (!rawData || rawData.length === 0) {
                alert("No data available");
                return;
            }

            const labels = rawData.map(d => new Date(d.timestamp).toLocaleTimeString());
            const temps = rawData.map(d => Number(d.temperature));
            const humidity = rawData.map(d => Number(d.humidity));

            new Chart(document.getElementById("tempChart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Temperature",
                        data: temps
                    }]
                }
            });

            new Chart(document.getElementById("humidityChart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Humidity",
                        data: humidity
                    }]
                }
            });

        };
    </script>

</body>

</html>
